# Netlify configuration for the OpenNyAI website
# Plain static site: index.html + assets/ at the repo root, no build step.

[build]
  # Serve the repository root as-is (nothing to compile).
  publish = "."
  command = ""

# Sensible security headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache the static assets (they're versioned by filename).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
