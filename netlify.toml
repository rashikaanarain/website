# Netlify configuration for the OpenNyAI website
# Bun + Vite site. Netlify installs from bun.lock and builds into dist.

[build]
  publish = "dist"
  command = "bun run build"

[build.environment]
  NETLIFY_USE_BUN = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible security headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache the static assets (they're versioned by filename).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
