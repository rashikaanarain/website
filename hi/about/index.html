          <p>OpenNyAI समुदायों और एआई को साथ लाता है, ताकि अधिक लोग अपने जीवन को प्रभावित करने वाली न्याय व्यवस्थाओं को समझ सकें, उनका उपयोग कर सकें और उन्हें बेहतर बना सकें।</p>
          <a class="hero-jump" href="#story"><span aria-hidden="true">↓</span>यात्रा देखें</a>

    <section class="story-section" id="story" aria-labelledby="story-title">
      <div class="wrap">
        <div class="story-intro reveal">
          <div>
            <span class="eyebrow">एक जीवंत समयरेखा</span>
            <h2 id="story-title">हर साल, सबके सामने बनती एक यात्रा।</h2>
          </div>
          <p class="story-deck">OpenNyAI साझा प्रयोगों, खुले बुनियादी ढाँचे और साथ मिलकर बनाने वाले लोगों के कारण आगे बढ़ा है। यह 2021 के एक विचार से 2026 में शुरू हो रहे <strong>समस्या-केंद्रित स्प्रिंट्स</strong> तक की यात्रा है।</p>
        </div>

        <div class="timeline" data-timeline>
          <div class="timeline-rail" aria-hidden="true"><span></span></div>

          <section class="timeline-year" aria-labelledby="year-2021">
            <h2 class="year-label" id="year-2021">2021</h2>
            <div class="year-events">
              <article class="milestone reveal">
                <time datetime="2021-04">अप्रैल</time>
                <div class="milestone-copy">
                  <h3>OpenNyAI मिशन की शुरुआत</h3>
                  <p>Agami, EkStep Foundation, NLSIU, Thoughtworks और Rohini Nilekani Philanthropies एक साझा सवाल के साथ आए: खुला एआई भारत में न्याय तक पहुँच कैसे बढ़ा सकता है?</p>
                  <a class="source-link" href="https://docs.jugalbandi.opennyai.org/community-and-collaboration/understanding-the-community-led-spirit-of-our-mission" target="_blank" rel="noopener">समुदाय की कहानी पढ़ें</a>
                </div>
              </article>

              <article class="milestone reveal">
                <time datetime="2021">2021 के आखिर में</time>
                <div class="milestone-copy">
                  <h3>कानूनी भाषा के लिए एआई की नींव</h3>
                  <p>टीमों ने भारतीय कानूनी पाठ के लिए खुले मॉडल बनाने शुरू किए। इनमें नाम और संस्थाएँ पहचानना, फैसलों के हिस्सों की भूमिका समझना और निर्णयों का सार बनाना शामिल था। यही काम आगे के औज़ारों और शोध की नींव बना।</p>
                  <a class="source-link" href="https://docs.jugalbandi.opennyai.org/introduction/about-openyai" target="_blank" rel="noopener">शुरुआती काम देखें</a>
                </div>
              </article>
            </div>
          </section>

          <section class="timeline-year" aria-labelledby="year-2022">
            <h2 class="year-label" id="year-2022">2022</h2>
            <div class="year-events">
              <article class="milestone reveal">
                <time datetime="2022-07">जुलाई से सितंबर</time>
                <div class="milestone-copy">
                  <h3>Make-a-thon ने दरवाज़े खोले</h3>
                  <p>आठ सप्ताह की ऑनलाइन चुनौती में इंजीनियर, वकील, डिज़ाइनर और उद्यमी साथ आए। उन्होंने कानूनी सेवाओं और न्याय तक पहुँच के लिए उपयोगी एआई समाधान बनाए।</p>
                  <a class="source-link" href="https://docs.jugalbandi.opennyai.org/community-and-collaboration/understanding-the-community-led-spirit-of-our-mission" target="_blank" rel="noopener">समुदाय कैसे बनाता है, जानें</a>
                </div>
              </article>

              <article class="milestone reveal">
                <time datetime="2022-09">सितंबर</time>
                <div class="milestone-copy">
                  <h3>KHOJ ने न्यायिक डेटा को उपयोगी बनाया</h3>
                  <p>छात्र स्वयंसेवकों, CivicDataLab और कानूनी शोध भागीदारों ने उच्च न्यायालय के न्यायाधीशों से जुड़ा व्यवस्थित सार्वजनिक डेटा तैयार किया। इसने दिखाया कि सावधानी से तैयार और साझा किया गया नागरिक डेटा क्या कर सकता है।</p>
                </div>
              </article>

              <article class="milestone reveal">
                <time datetime="2022-12-10">10 दिसंबर</time>
                <div class="milestone-copy">
                  <h3>Jugalbandi पहली बार सामने आया</h3>
                  <p>समुदाय ने एक खुला संवादात्मक एआई ढाँचा प्रस्तुत किया। यह बड़े भाषा मॉडल, भारतीय भाषाओं और WhatsApp जैसे परिचित माध्यमों को सार्वजनिक जानकारी और सेवाओं से जोड़ सकता था।</p>
                  <a class="source-link" href="https://news.microsoft.com/source/asia/features/with-help-from-next-generation-ai-indian-villagers-gain-easier-access-to-government-services/" target="_blank" rel="noopener">Jugalbandi का उपयोग देखें</a>
                </div>
              </article>
            </div>
          </section>

          <section class="timeline-year" aria-labelledby="year-2023">
            <h2 class="year-label" id="year-2023">2023</h2>
            <div class="year-events">
              <article class="milestone reveal">
                <time datetime="2023-07-28">28 जुलाई से 1 अगस्त</time>
                <div class="milestone-copy">
                  <h3>पहली Maker Residency</h3>
                  <p>30 से अधिक नवप्रवर्तकों ने पाँच केंद्रित दिनों तक मार्गदर्शकों के साथ काम किया। पुरानी न्याय समस्याओं को समझने से लेकर काम करने वाले शुरुआती नमूने बनाने तक की यात्रा यहीं हुई।</p>
                  <figure class="milestone-media">
                    <img src="../../assets/about/maker-residency-2023.jpg" alt="2023 OpenNyAI Maker Residency में साथ काम करते प्रतिभागी" loading="lazy" />
                    <figcaption>OpenNyAI Maker Residency, 2023. चित्र: Agami Field Notes.</figcaption>
                  </figure>
                  <a class="source-link" href="https://notes.agami.in/p/shaping-tomorrow-blending-ai-and" target="_blank" rel="noopener">रेज़िडेंसी का फील्ड नोट पढ़ें</a>
                </div>
              </article>

              <article class="milestone reveal">
                <time datetime="2023">2023</time>
                <div class="milestone-copy">
                  <h3>JIVA ने न्यायाधीशों के लिए एआई सहायक की संभावना खोजी</h3>
                  <p>Judges' Intelligent Virtual Assistant के नमूने ने यह देखा कि कानूनी पेशेवर संबंधित अधिनियम, धाराएँ और प्रामाणिक स्रोत अधिक तेज़ी से कैसे पा सकते हैं।</p>
                </div>
              </article>

              <article class="milestone reveal">
                <time datetime="2023-12">दिसंबर</time>
                <div class="milestone-copy">
                  <h3>Jugalbandi Studio का आरंभ</h3>
                  <p>कम कोड वाले इस वातावरण ने विषय विशेषज्ञों और नागरिक डेवलपर्स के लिए सामान्य भाषा में दिए विचारों को इस्तेमाल किए जा सकने वाले एआई समाधान में बदलना आसान किया।</p>
                  <figure class="milestone-media">
                    <img src="../../assets/about/jugalbandi-studio.jpg" alt="Jugalbandi Studio का परिचय देती एक प्रस्तुति" loading="lazy" />
                    <figcaption>Jugalbandi Studio का परिचय. चित्र: Agami Field Notes.</figcaption>
                  </figure>
                  <a class="source-link" href="https://notes.agami.in/p/jugalbandi-studio-bridging-the-gap" target="_blank" rel="noopener">आरंभ की कहानी पढ़ें</a>
                </div>
              </article>
            </div>
          </section>

          <section class="timeline-year" aria-labelledby="year-2024">
            <h2 class="year-label" id="year-2024">2024</h2>
            <div class="year-events">
              <article class="milestone reveal">
                <time datetime="2024-01-30">30 जनवरी</time>
                <div class="milestone-copy">
                  <h3>Aalap भारतीय कानूनी कामों के लिए बना</h3>
                  <p>भारतीय कानूनी और पैरालीगल काम के लिए निर्देशों पर तैयार किया गया भाषा मॉडल Aalap, खुले समुदाय को जाँचने और बेहतर बनाने के लिए एक और आधार देता है।</p>
                </div>
              </article>

              <article class="milestone reveal">
                <time datetime="2024">2024</time>
                <div class="milestone-copy">
                  <h3>pRAGyoga ने कानूनी खोज की गुणवत्ता मापी</h3>
                  <p>समुदाय ने भारतीय कानून के सवालों और मूल्यांकन के तरीकों का संग्रह बनाना शुरू किया, ताकि स्रोत खोजकर जवाब देने वाले एआई की गुणवत्ता को मान लेने के बजाय सही तरह से मापा जा सके।</p>
                </div>
              </article>

              <article class="milestone reveal">
                <time datetime="2024-09-26">26 से 29 सितंबर</time>
                <div class="milestone-copy">
                  <h3>दूसरी Maker Residency ने और गहराई से काम किया</h3>
                  <p>निर्माताओं ने शिकायत निवारण, पैरालीगल क्षमता और पर्यावरण न्याय के लिए डिजिटल सार्वजनिक साधनों पर ध्यान दिया। हर समाधान से जुड़े पूरे समुदाय और व्यवस्था को डिज़ाइन का हिस्सा माना गया।</p>
                  <a class="source-link" href="https://docs.jugalbandi.opennyai.org/community-and-collaboration/understanding-the-community-led-spirit-of-our-mission" target="_blank" rel="noopener">सहयोग का तरीका समझें</a>
                </div>
              </article>
            </div>
          </section>

          <section class="timeline-year" aria-labelledby="year-2025">
            <h2 class="year-label" id="year-2025">2025</h2>
            <div class="year-events">
              <article class="milestone reveal">
                <time datetime="2025-06-02">2 से 6 जून</time>
                <div class="milestone-copy">
                  <h3>तीसरी Maker Residency ने शिकायत निवारण को नए सिरे से देखा</h3>
                  <p>सरकारी प्रतिनिधियों और न्याय इकोसिस्टम के सदस्यों सहित लगभग 60 जस्टिसमेकर्स नई दिल्ली में साथ आए। उन्होंने खोजा कि सार्वजनिक शिकायत प्रणालियाँ अधिक संवेदनशील, समावेशी और भरोसेमंद कैसे बन सकती हैं।</p>
                  <figure class="milestone-media">
                    <img src="../../assets/about/maker-residency-2025.webp" alt="नई दिल्ली में 2025 OpenNyAI Maker Residency में प्रस्तुति देते प्रतिभागी" loading="lazy" />
                    <figcaption>शिकायत निवारण पर Maker Residency, नई दिल्ली, 2025. चित्र: World Bank.</figcaption>
                  </figure>
                  <a class="source-link" href="https://blogs.worldbank.org/en/governance/civic--amplifying-citizens--voice-through-ai-powered-grievance-r" target="_blank" rel="noopener">World Bank का विवरण पढ़ें</a>
                </div>
              </article>

              <article class="milestone reveal">
                <time datetime="2025">2025</time>
                <div class="milestone-copy">
                  <h3>MISAAL ने असली कानूनी सवालों से शुरुआत की</h3>
                  <p>समुदाय के सदस्यों, पैरालीगल और नागरिकों ने भारतीय कानूनी सवालों पर एआई के जवाबों के लिए एक खुला मानदंड बनाना शुरू किया। इसका आधार यह है कि वास्तव में उपयोगी जवाब में क्या होना चाहिए।</p>
                  <a class="source-link" href="/hi/misaal/">MISAAL देखें</a>
                </div>
              </article>
            </div>
          </section>

          <section class="timeline-year is-finale" aria-labelledby="year-2026">
            <h2 class="year-label" id="year-2026">2026</h2>
            <div class="year-events">
              <article class="milestone reveal">
                <time datetime="2026-07">जुलाई</time>
                <div class="milestone-copy">
                  <h3>OpenNyAI Sprints की शुरुआत</h3>
                  <p>मिशन अब बार-बार होने वाले स्प्रिंट मॉडल में आगे बढ़ता है। एक अटकी हुई न्याय समस्या के आसपास लोग जुटते हैं, सबके सामने बनाते हैं, समस्या के सबसे करीब लोगों के साथ जाँचते हैं और जो काम करे उसे साझा करते हैं। पहला सर्किट Big Bail Bash है।</p>
                  <div class="sprint-circuit" aria-label="OpenNyAI Sprint कैसे काम करता है">

                  <a class="sprint-link" href="/hi/#problems">पहले सर्किट से जुड़ें</a>
                </div>
              </article>

      </div>
